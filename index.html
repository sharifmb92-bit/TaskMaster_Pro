<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121214">
    <style>
        :root {
            --bg-main: #121214;
            --bg-card: #1e1e24;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --accent-gray: #3a3a42;
            --color-high: #ff4d4d;
            --color-medium: #ff9933;
            --color-low: #33cc66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h1, h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input, select {
            background: var(--bg-main);
            border: 1px solid var(--accent-gray);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--text-muted);
        }

        button {
            background: #4a4ae8;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background: #3b3be0;
        }

        .timeline {
            margin-top: 30px;
            position: relative;
            padding-left: 20px;
            border-left: 2px solid var(--accent-gray);
        }

        .task-card {
            background: var(--bg-main);
            border: 1px solid var(--accent-gray);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
            transition: transform 0.2s;
        }

        .task-card::before {
            content: '';
            position: absolute;
            left: -27px;
            top: 22px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-gray);
        }

        .task-card.priority-high::before { background: var(--color-high); }
        .task-card.priority-medium::before { background: var(--color-medium); }
        .task-card.priority-low::before { background: var(--color-low); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .task-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .task-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            width: auto;
            margin: 0;
        }

        .btn-complete { background: var(--color-low); }
        .btn-delete { background: var(--color-high); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Nueva Tarea</h1>
        
        <div class="form-group">
            <label>Nombre de la tarea</label>
            <input type="text" id="taskTitle" placeholder="Ej. Revisar niveles del vehículo">
        </div>

        <div class="form-group">
            <label>Fecha y Hora de Alerta</label>
            <input type="datetime-local" id="taskTime">
        </div>

        <div class="form-group">
            <label>Prioridad / Nivel de Alerta</label>
            <select id="taskPriority">
                <option value="low">Baja (Normal)</option>
                <option value="medium">Media (Aviso previo 15 min)</option>
                <option value="high">Alta (Crítica + Alarma continua)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Recurrencia (Repetir)</label>
            <select id="taskRepetition">
                <option value="none">No repetir</option>
                <option value="daily">Diariamente</option>
                <option value="weekly">Semanalmente</option>
            </select>
        </div>

        <button onclick="addTask()">Programar Tarea</button>

        <h2 style="margin-top: 40px;">Línea de Tiempo</h2>
        <div class="timeline" id="timeline"></div>
    </div>

    <script>
        // medbasha
        let tasks = JSON.parse(localStorage.getItem('pro_tasks')) || [];
        let activeTimeout = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg))
                    .catch(err => console.error('Error al registrar Service Worker', err));
            }

            if (Notification.permission !== 'granted') {
                Notification.requestPermission();
            }
            renderTasks();
            programNextAlert();
        });

        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const timeStr = document.getElementById('taskTime').value;
            const priority = document.getElementById('taskPriority').value;
            const repeat = document.getElementById('taskRepetition').value;

            if (!title || !timeStr) return alert("Por favor, rellena los campos principales.");

            const task = {
                id: 'task_' + Date.now(),
                title,
                time: new Date(timeStr).getTime(),
                priority,
                repeat,
                completed: false,
                notified: false,
                preNotified: false
            };

            tasks.push(task);
            saveAndRefresh();
        }

        function renderTasks() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            tasks.sort((a, b) => a.time - b.time);

            tasks.forEach(task => {
                if (task.completed) return;

                const card = document.createElement('div');
                card.className = `task-card priority-${task.priority}`;
                
                const dateStr = new Date(task.time).toLocaleString([], {hour: '2-digit', minute:'2-digit', day: '2-digit', month: '2-digit'});
                let repeatText = task.repeat !== 'none' ? `🔁 Repetición: ${task.repeat}` : '';

                card.innerHTML = `
                    <div class="task-header">
                        <span class="task-title">${task.title}</span>
                    </div>
                    <div class="task-meta">
                        <span>⏰ ${dateStr}</span>
                        ${repeatText ? `<span>${repeatText}</span>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="btn-action btn-complete" onclick="completeTask('${task.id}')">Hecho</button>
                        <button class="btn-action btn-delete" onclick="deleteTask('${task.id}')">Eliminar</button>
                    </div>
                `;
                timeline.appendChild(card);
            });
        }

        function programNextAlert() {
            if (activeTimeout) clearTimeout(activeTimeout);
            if (tasks.length === 0) return;

            const now = Date.now();
            const futureTasks = tasks.filter(t => !t.completed);

            if (futureTasks.length === 0) return;

            let nextTargetTime = Infinity;
            let nextTaskInstance = null;
            let isPreNotification = false;

            futureTasks.forEach(task => {
                if ((task.priority === 'medium' || task.priority === 'high') && !task.preNotified) {
                    const preTime = task.time - (15 * 60 * 1000);
                    if (preTime > now && preTime < nextTargetTime) {
                        nextTargetTime = preTime;
                        nextTaskInstance = task;
                        isPreNotification = true;
                    }
                }
                if (!task.notified && task.time > now && task.time < nextTargetTime) {
                    nextTargetTime = task.time;
                    nextTaskInstance = task;
                    isPreNotification = false;
                }
            });

            if (!nextTaskInstance || nextTargetTime === Infinity) return;

            const timeToWait = nextTargetTime - now;

            activeTimeout = setTimeout(() => {
                if (isPreNotification) {
                    triggerNotification(`Aviso previo: ${nextTaskInstance.title} en 15 min.`);
                    nextTaskInstance.preNotified = true;
                } else {
                    triggerNotification(`¡Es hora! Tarea: ${nextTaskInstance.title}`);
                    
                    if (nextTaskInstance.priority === 'high') {
                        nextTaskInstance.time = Date.now() + (60 * 1000);
                        triggerNotification(`[CRÍTICA] Volverá a alertar en 1 minuto si no se completa.`);
                    } else {
                        nextTaskInstance.notified = true;
                    }

                    if (nextTaskInstance.repeat !== 'none') {
                        handleRepetition(nextTaskInstance);
                    }
                }
                saveAndRefresh();
            }, timeToWait);
        }

        function handleRepetition(task) {
            const currentObj = new Date(task.time);
            if (task.repeat === 'daily') {
                currentObj.setDate(currentObj.getDate() + 1);
            } else if (task.repeat === 'weekly') {
                currentObj.setDate(currentObj.getDate() + 7);
            }
            task.time = currentObj.getTime();
            task.notified = false;
            task.preNotified = false;
        }

        function triggerNotification(text) {
            if (Notification.permission === 'granted') {
                new Notification("TaskMaster Alerta", {
                    body: text,
                    icon: "icon.png"
                });
            }
        }

        function completeTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: true } : t);
            saveAndRefresh();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('pro_tasks', JSON.stringify(tasks));
            renderTasks();
            programNextAlert();
        }
    </script>
</body>
</html>
